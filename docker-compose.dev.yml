services:
  webapp:
    container_name: ${WEBAPP_HOST}
    build:
      context: ./webapp
      dockerfile: Dockerfile
    image: teachingplanner_webapp:dev
    ports:
      - "${WEBAPP_PORT}:80" # Mapeo: puerto del host (WEBAPP_PORT) → puerto 80 en el contenedor
      - "443:443"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - gateway_service
    networks:
      - app_network
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./certs:/certs:ro

  gateway_service:
    container_name: ${GATEWAY_SERVICE_HOST}
    build:
      context: ./gateway_service
      dockerfile: Dockerfile
    image: teachingplanner_gateway_service:dev
    ports:
      - "${GATEWAY_SERVICE_PORT}:${GATEWAY_SERVICE_PORT}"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - planner_service
    networks:
      - app_network

  planner_service:
    container_name: planner_service
    build:
      context: ./planner_service
      dockerfile: Dockerfile
    image: teachingplanner_planner_service:dev
    ports:
      - "${PLANNER_SERVICE_PORT}:${PLANNER_SERVICE_PORT}"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - planner_database
    networks:
      - app_network

  planner_database:
    container_name: ${PLANNER_DATABASE_HOST}
    build:
      context: ./planner_database
      dockerfile: Dockerfile
    image: teachingplanner_planner_database:dev
    environment:
      MARIADB_ROOT_PASSWORD: ${PLANNER_DATABASE_ROOT_PASSWORD}
      MARIADB_DATABASE: ${PLANNER_DATABASE_DATABASE}
      MARIADB_USER: ${PLANNER_DATABASE_USER}
      MARIADB_PASSWORD: ${PLANNER_DATABASE_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    volumes:
      - planner_database_volume:/var/lib/mysql
    ports:
      - "${PLANNER_DATABASE_PORT}:3306"
    networks:
      - app_network

  auth_service:
    container_name: ${AUTH_SERVICE_HOST}
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    image: teachingplanner_auth_service:dev
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - management_database
    networks:
      - app_network

  user_service:
    container_name: ${USER_SERVICE_HOST}
    build:
      context: ./user_service
      dockerfile: Dockerfile
    image: teachingplanner_user_service:dev
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - management_database
      - auth_service
    networks:
      - app_network

  management_database:
    container_name: ${MANAGEMENT_DATABASE_HOST}
    build:
      context: ./management_database
      dockerfile: Dockerfile
    image: teachingplanner_management_database:dev
    environment:
      MARIADB_ROOT_PASSWORD: ${MANAGEMENT_DATABASE_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MANAGEMENT_DATABASE_DATABASE}
      MARIADB_USER: ${MANAGEMENT_DATABASE_USER}
      MARIADB_PASSWORD: ${MANAGEMENT_DATABASE_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    volumes:
      - management_database_volume:/var/lib/mysql
    ports:
      - "${MANAGEMENT_DATABASE_PORT}:3306"
    networks:
      - app_network

volumes:
  planner_database_volume:
  management_database_volume:
  caddy_data:
  caddy_config:

networks:
  app_network:
    driver: bridge