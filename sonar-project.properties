# ========================================
# Configuración de encoding
# ========================================
sonar.sourceEncoding=UTF-8

# ========================================
# Configuración de Ramas
# ========================================
# SonarQube mostrará análisis separados para cada rama
# La rama principal (develop) se comparará contra la rama objetivo (main)
sonar.branch.name=${SONAR_BRANCH_NAME}
sonar.branch.target=${SONAR_BRANCH_TARGET}

# ========================================
# Microservicios individuales (para referencia)
# ========================================
# Auth Service: auth_service/src
# Gateway Service: gateway_service/src
# Planner Service: planner_service/src
# User Service: user_service/src
# WebApp: webapp/src