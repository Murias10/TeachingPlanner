# ========================================
# Configuración general del proyecto
# ========================================
sonar.projectKey=teaching-planner
sonar.projectName=Teaching Planner
sonar.projectVersion=1.0.0

# Directorio base del código fuente
sonar.sources=auth_service/src,gateway_service/src,planner_service/src,user_service/src,webapp/src

# ========================================
# Exclusiones globales
# ========================================
# Archivos y directorios a excluir del análisis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.tsx,\
  **/*.test.tsx,\
  **/vite-env.d.ts,\
  webapp/src/components/ui/**,\
  management_database/**,\
  planner_database/**,\
  .github/**,\
  **/*.md

# ========================================
# Configuración de TypeScript
# ========================================
sonar.typescript.node=node_modules
sonar.typescript.lcov.reportPaths=\
  auth_service/coverage/lcov.info,\
  gateway_service/coverage/lcov.info,\
  planner_service/coverage/lcov.info,\
  user_service/coverage/lcov.info,\
  webapp/coverage/lcov.info

# ========================================
# Configuración de cobertura de tests
# ========================================
# Rutas donde se encuentran los reportes de cobertura
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.tsx,\
  **/*.test.tsx,\
  **/index.ts,\
  **/main.tsx,\
  webapp/src/components/ui/**

# ========================================
# Configuración específica de React/JSX
# ========================================
# Para el frontend webapp (React + TypeScript)
sonar.javascript.lcov.reportPaths=webapp/coverage/lcov.info

# ========================================
# Límites y umbrales de calidad
# ========================================
# Desactivar análisis de duplicados en componentes UI generados
sonar.cpd.exclusions=webapp/src/components/ui/**

# ========================================
# Configuración de encoding
# ========================================
sonar.sourceEncoding=UTF-8

# ========================================
# Microservicios individuales (para referencia)
# ========================================
# Auth Service: auth_service/src
# Gateway Service: gateway_service/src
# Planner Service: planner_service/src
# User Service: user_service/src
# WebApp: webapp/src