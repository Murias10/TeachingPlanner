name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Unit tests"

  e2e-tests:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - run: echo "E2E tests"

  docker-push-webapp:
    name: Push webapp Docker Image to GitHub Packages
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./webapp/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/webapp:latest

  deploy:
    name: Deploy to Azure VM
    needs: [docker-push-webapp]
    runs-on: ubuntu-latest
    steps:

      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}

      - name: 📤 Desplegar en Azure VM
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.PAT_TOKEN }}
            docker pull ghcr.io/${{ vars.REPOSITORY_NAME }}/webapp:latest
            docker stop webapp || true
            docker rm webapp || true
            docker run -d --name webapp -p 80:80 ghcr.io/${{ github.repository }}/webapp:latest