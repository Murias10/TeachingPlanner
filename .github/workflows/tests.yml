name: Build & Test

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependencias
        run: |
          npm --prefix users/utils ci
          npm --prefix users/authservice ci
          npm --prefix users/userservice ci
          npm --prefix questionservice ci
          npm --prefix gatewayservice ci
          npm --prefix webapp ci

      - name: 🧪 Ejecutar Tests Unitarios
        run: |
          npm --prefix users/utils test -- --coverage
          npm --prefix users/authservice test -- --coverage
          npm --prefix users/userservice test -- --coverage
          npm --prefix questionservice test -- --coverage
          npm --prefix gatewayservice test -- --coverage
          npm --prefix webapp test -- --coverage

      - name: 📊 Analizar con SonarCloud
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e-tests:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependencias
        run: |
          npm --prefix users/utils install
          npm --prefix users/authservice install
          npm --prefix users/userservice install
          npm --prefix questionservice install
          npm --prefix gatewayservice install
          npm --prefix webapp install

      - name: 🚀 Construir la aplicación
        run: npm --prefix webapp run build

      - name: ⚙️ Permisos de red para Node.js
        run: sudo setcap 'cap_net_bind_service=+ep' `which node`

      - name: 🏁 Ejecutar Tests E2E
        run: npm --prefix webapp run test:e2eci
