# ========================================
# Configuración general del proyecto
# ========================================
sonar.projectKey=teaching-planner
sonar.projectName=Teaching Planner
sonar.projectVersion=1.0.0

# Directorio base del código fuente
sonar.sources=auth_service/src,gateway_service/src,planner_service/src,user_service/src,webapp/src

# ========================================
# Exclusiones globales
# ========================================
# Archivos y directorios a excluir del análisis
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.tsx,\
  **/*.test.tsx,\
  **/vite-env.d.ts,\
  webapp/src/components/ui/alert.tsx,\
  webapp/src/components/ui/alert-dialog.tsx,\
  webapp/src/components/ui/avatar.tsx,\
  webapp/src/components/ui/badge.tsx,\
  webapp/src/components/ui/breadcrumb.tsx,\
  webapp/src/components/ui/button.tsx,\
  webapp/src/components/ui/calendar.tsx,\
  webapp/src/components/ui/card.tsx,\
  webapp/src/components/ui/checkbox.tsx,\
  webapp/src/components/ui/collapsible.tsx,\
  webapp/src/components/ui/command.tsx,\
  webapp/src/components/ui/context-menu.tsx,\
  webapp/src/components/ui/dialog.tsx,\
  webapp/src/components/ui/drawer.tsx,\
  webapp/src/components/ui/dropdown-menu.tsx,\
  webapp/src/components/ui/input.tsx,\
  webapp/src/components/ui/input-otp.tsx,\
  webapp/src/components/ui/label.tsx,\
  webapp/src/components/ui/popover.tsx,\
  webapp/src/components/ui/progress.tsx,\
  webapp/src/components/ui/radio-group.tsx,\
  webapp/src/components/ui/scroll-area.tsx,\
  webapp/src/components/ui/select.tsx,\
  webapp/src/components/ui/separator.tsx,\
  webapp/src/components/ui/sheet.tsx,\
  webapp/src/components/ui/sidebar.tsx,\
  webapp/src/components/ui/skeleton.tsx,\
  webapp/src/components/ui/switch.tsx,\
  webapp/src/components/ui/table.tsx,\
  webapp/src/components/ui/tabs.tsx,\
  webapp/src/components/ui/textarea.tsx,\
  webapp/src/components/ui/tooltip.tsx,\
  webapp/src/components/ui/spinner.tsx,\
  webapp/src/components/ui/time-picker.tsx,\
  management_database/**,\
  planner_database/**,\
  .github/**,\
  **/*.md

# ========================================
# Configuración de TypeScript
# ========================================
sonar.typescript.node=node_modules
sonar.typescript.lcov.reportPaths=\
  auth_service/coverage/lcov.info,\
  gateway_service/coverage/lcov.info,\
  planner_service/coverage/lcov.info,\
  user_service/coverage/lcov.info,\
  webapp/coverage/lcov.info

# ========================================
# Configuración de cobertura de tests
# ========================================
# Rutas donde se encuentran los reportes de cobertura
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.tsx,\
  **/*.test.tsx,\
  **/index.ts,\
  **/main.tsx,\
  webapp/src/components/ui/alert.tsx,\
  webapp/src/components/ui/alert-dialog.tsx,\
  webapp/src/components/ui/avatar.tsx,\
  webapp/src/components/ui/badge.tsx,\
  webapp/src/components/ui/breadcrumb.tsx,\
  webapp/src/components/ui/button.tsx,\
