name: Deploy on Release/Push to main  # Nombre del workflow

on:
  release:
    types: [published]  # Se ejecuta automáticamente cuando se publica un release en GitHub
  push:
    branches:
      - main  # También se ejecuta cuando hay un push a la rama main

jobs:
  unit-tests:  # Job para ejecutar pruebas unitarias
    runs-on: ubuntu-latest  # Usa la última versión de Ubuntu
    steps:
      - run: echo "Unit tests"  # Simulación de ejecución de tests unitarios

  e2e-tests:  # Job para ejecutar pruebas end-to-end
    needs: [unit-tests]  # Se ejecuta solo si los tests unitarios han pasado
    runs-on: ubuntu-latest
    steps:
      - run: echo "E2E tests"  # Simulación de ejecución de tests E2E

  docker-push-images:
    needs: [e2e-tests]  # Depende de que los tests E2E hayan pasado
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Clonar el código fuente
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Construir y subir imagen webapp
        uses: docker/build-push-action@v3
        with:
          context: ./webapp
          file: ./webapp/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/webapp:latest

      - name: 🏗️ Construir y subir imagen gateway_service
        uses: docker/build-push-action@v3
        with:
          context: ./gateway_service
          file: ./gateway_service/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/gateway_service:latest

      - name: 🏗️ Construir y subir imagen planner_database
        uses: docker/build-push-action@v3
        with:
          context: ./planner_database
          file: ./planner_database/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/planner_database:latest

      - name: 🏗️ Construir y subir imagen planner_service
        uses: docker/build-push-action@v3
        with:
          context: ./planner_service
          file: ./planner_service/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/planner_service:latest

      - name: 🏗️ Construir y subir imagen auth_service
        uses: docker/build-push-action@v3
        with:
          context: ./auth_service
          file: ./auth_service/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/auth_service:latest

      - name: 🏗️ Construir y subir imagen user_service
        uses: docker/build-push-action@v3
        with:
          context: ./user_service
          file: ./user_service/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/user_service:latest

      - name: 🏗️ Construir y subir imagen management_database
        uses: docker/build-push-action@v3
        with:
          context: ./management_database
          file: ./management_database/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPOSITORY_NAME }}/management_database:latest

  deploy:
    needs: [docker-push-images]  # Se ejecuta solo después de que las imágenes han sido subidas
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}

      - name: 📥 Clonar el código fuente
        uses: actions/checkout@v4

      - name: Listar archivos en el directorio de trabajo
        run: ls -al  # Esto ayudará a verificar que los archivos están presentes en la raíz

      - name: 📤 Copiar docker-compose.yml al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          source: "./docker-compose.yml"
          target: "/home/${{ secrets.AZURE_VM_USER }}/TeachingPlanner"
          port: 22

      - name: 📤 Desplegar en Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            echo "🔐 Autenticando en GHCR"
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📁 Navegando al directorio del proyecto"
            cd ~/TeachingPlanner

            echo "♻️ Limpiando contenedores e imágenes antiguas"
            docker compose down --rmi all --remove-orphans

            # 🗑️ DESCOMENTAR SOLO SI QUIERES BORRAR LOS DATOS DE LAS BASES DE DATOS
            echo "🗑️ Eliminando volúmenes de bases de datos"
            docker volume rm planner_database_volume || true
            docker volume rm management_database_volume || true

            echo "🚀 Descargando y levantando todo de nuevo"
            docker compose up -d --pull always --force-recreate --remove-orphans